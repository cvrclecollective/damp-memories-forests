<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Damp Memories Forest</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0d1b13;
  font-family: serif;
}

canvas {
  display: block;
  cursor: crosshair;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "YOUR DOMAIN",
  projectId: "YOUR ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = "draw";
let drawing = false;
let currentPath = [];
let elements = [];
let selected = null;

// 🌫️ SOFT ZONES (gradient, not blocks)
function drawZones() {
  const w = canvas.width;
  const h = canvas.height;

  let grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, "#000000");
  grad.addColorStop(0.5, "#444");
  grad.addColorStop(1, "#3a4f7a");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  ctx.globalAlpha = 0.2;
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, 120);
  ctx.globalAlpha = 1;
}

// 🌳 RENDER
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawZones();

  elements.forEach(el => {
    if (el.type === "path") {
      ctx.beginPath();
      el.points.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    if (el.type === "text") {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.font = "16px serif";
      ctx.fillText(el.text, el.x, el.y);
    }
  });
}

// 🖱️ INTERACTION
canvas.onmousedown = (e) => {
  const x = e.clientX;
  const y = e.clientY;

  if (mode === "draw") {
    drawing = true;
    currentPath = [{ x, y }];
  }

  else if (mode === "text") {
    const txt = prompt("write what never dried...");
    if (txt) {
      addDoc(collection(db, "elements"), {
        type: "text",
        text: txt,
        x, y
      });
    }
    mode = "draw";
  }

  else if (mode === "move") {
    selected = elements.find(el =>
      el.type === "text" &&
      Math.abs(el.x - x) < 60 &&
      Math.abs(el.y - y) < 20
    );
  }

  else if (mode === "erase") {
    const target = elements.find(el => {
      if (el.type === "text") {
        return Math.abs(el.x - x) < 60 && Math.abs(el.y - y) < 20;
      }
      if (el.type === "path") {
        return el.points.some(p =>
          Math.abs(p.x - x) < 10 && Math.abs(p.y - y) < 10
        );
      }
    });

    if (target) {
      deleteDoc(doc(db, "elements", target.id));
    }

    mode = "draw";
  }
};

canvas.onmousemove = (e) => {
  const x = e.clientX;
  const y = e.clientY;

  if (drawing) {
    currentPath.push({ x, y });
    render();
    ctx.beginPath();
    currentPath.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.stroke();
  }

  if (selected) {
    selected.x = x;
    selected.y = y;
    updateDoc(doc(db, "elements", selected.id), { x, y });
  }
};

canvas.onmouseup = () => {
  if (drawing) {
    addDoc(collection(db, "elements"), {
      type: "path",
      points: currentPath
    });
    drawing = false;
  }
  selected = null;
};

// ⌨️ KEYBOARD MODES
window.onkeydown = (e) => {
  if (e.key === "t") mode = "text";
  if (e.key === "e") mode = "erase";
  if (e.key === "m") mode = "move";
};

// 🌱 INITIAL FOREST (only if empty)
onSnapshot(collection(db, "elements"), (snapshot) => {
  if (snapshot.empty) {
    addDoc(collection(db, "elements"), { type: "text", text: "she left before the coffee cooled", x: 200, y: 300 });
    addDoc(collection(db, "elements"), { type: "text", text: "the sound of an empty room", x: 600, y: 400 });
    addDoc(collection(db, "elements"), { type: "text", text: "the part I didn’t say out loud", x: 900, y: 500 });
  }

  elements = [];
  snapshot.forEach(docSnap => {
    elements.push({ id: docSnap.id, ...docSnap.data() });
  });

  render();
});
</script>

</body>
</html>
